name: Security Audit

on:
  # Run on push to main branches
  push:
    branches:
      - main
      - develop
  
  # Run on pull requests
  pull_request:
    branches:
      - main
      - develop
  
  # Run weekly on Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run npm audit
        id: npm-audit
        run: |
          echo "Running npm audit..."
          npm audit --audit-level=moderate --json > audit-report.json || true
          
          # Display audit results
          npm audit --audit-level=moderate || true
          
          # Check if there are vulnerabilities
          VULN_COUNT=$(cat audit-report.json | jq '.metadata.vulnerabilities | to_entries | map(.value) | add // 0')
          echo "vulnerability_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "Found $VULN_COUNT vulnerabilities"
            exit 1
          fi
        continue-on-error: true
      
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30
      
      - name: Check for outdated packages
        run: |
          echo "Checking for outdated packages..."
          npm outdated || true
      
      - name: Comment PR with audit results
        if: github.event_name == 'pull_request' && steps.npm-audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditReport = JSON.parse(fs.readFileSync('audit-report.json', 'utf8'));
            const vulnCount = auditReport.metadata.vulnerabilities;
            
            const comment = `## Security Audit Results
            
            Found vulnerabilities in dependencies:
            - Critical: ${vulnCount.critical || 0}
            - High: ${vulnCount.high || 0}
            - Moderate: ${vulnCount.moderate || 0}
            - Low: ${vulnCount.low || 0}
            
            Please review and fix these vulnerabilities before merging.
            
            Run \`npm audit fix\` to automatically fix compatible issues.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Fail if vulnerabilities found
        if: steps.npm-audit.outcome == 'failure'
        run: |
          echo "Security vulnerabilities detected. Please fix them before merging."
          exit 1

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json
      
      - name: Upload Snyk report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report
          path: snyk-report.json
          retention-days: 30

  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install license checker
        run: npm install -g license-checker
      
      - name: Check licenses
        run: |
          echo "Checking dependency licenses..."
          license-checker --json --out licenses.json
          
          # Check for problematic licenses
          license-checker --failOn "GPL;AGPL;LGPL" || true
      
      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json
          retention-days: 30
